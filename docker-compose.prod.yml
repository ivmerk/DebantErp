name: debanterp

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4
    container_name: debanterp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  migrator:
    image: ghcr.io/${GH_REPO}/migrator:${TAG}
    profiles: ["migrate"]
    environment:
      PGPASSWORD: ${PG_PASSWORD}
      PG_HOST: postgres
      PG_USER: ${PG_USER}
      PG_DB: ${PG_DB}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/${GH_REPO}/web:${TAG}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${PG_DB};Username=${PG_USER};Password=${PG_PASSWORD}"
    volumes:
      # DataProtection-keys для cookies. Без persistent volume сессии теряются
      # на каждом рестарте контейнера (cookies становятся нерасшифровываемыми).
      # Папка на хосте должна быть owned by uid 1654 (юзер `app` в aspnet:10.0-alpine).
      - ./data/data-protection:/app/.data-protection
      # Логи Serilog (rolling file). Переживают пересоздание контейнера.
      # Папка на хосте тоже должна быть owned by uid 1654.
      - ./data/logs:/app/.logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
